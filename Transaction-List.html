<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Transactions | Personal Finance Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header class="bg-white border-bottom py-3">
        <div class="container d-flex justify-content-between align-items-center">
            <h1 class="h4 fw-bold mb-0">Personal Finance Tracker</h1>
            <div class="d-flex align-items-center gap-3 links">
                <a href="index.html" class="text-decoration-none small fw-bold ">Dashboard</a>
                <a href="Transaction-List.html" class="text-decoration-none small fw-bold">Transactions</a>
                <a href="Category-overview.html" class="text-decoration-none small fw-bold">Category</a>
    
    
                <div class="avatar-placeholder">JD</div>
            </div>
    </header>

    <main class="container py-5 header">
        <header class="d-flex flex-column flex-md-row justify-content-between align-items-md-end mb-4 gap-3">
            <div>
                <h1 class="h3 fw-bold mb-1">Transactions</h1>
                <p class="text-muted small mb-0">Review and manage your latest financial activities.</p>
            </div>
            <div class="d-flex gap-2">
                <button class="btn btn-white border shadow-sm btn-sm px-3 rounded-2">Export CSV</button>
                <a href="Add-Transaction.html" class="btn btn-brand btn-sm px-3 rounded-2">+ New Transaction</a>
            </div>
        </header>

        <div class="transaction-container">

            <div class="list-header d-none d-md-grid row m-0">
                <div class="col-6">Details</div>
                <div class="col-2">Date</div>
                <div class="col-2 text-end">Amount</div>
                <div class="col-2 text-end">Action</div>
            </div>

            <ul  id="listTransaction" class="list-group list-group-flush">
                <!-- Transactions will be dynamically inserted here by JavaScript -->
            </ul>

            <section class="bg-light px-4 py-3 d-flex justify-content-between align-items-center border-top">
                <div class="small text-muted">
                    Showing <span class="fw-bold text-dark">4</span> of <span class="fw-bold text-dark">128</span>
                </div>
                <nav class="d-flex">
                    <a href="#" class="page-link-custom rounded-start-2">Previous</a>
                    <a href="#" class="page-link-custom rounded-end-2 border-start-0">Next</a>
                </nav>
            </section>
        </div>
    </main>

    <footer class="text-center py-5 text-muted small">
        <p>© 2023 Personal Finance Dashboard. All rights reserved.</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
        <script src="js/Transaction-list.js"></script>
</body>

</html>
